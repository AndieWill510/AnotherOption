name: Add option navigation footers

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-option-nav.yml
      - tools/add_option_nav.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-option-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Add navigation footers
        run: python tools/add_option_nav.py

      - name: Commit navigation footer updates
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Options/*.md
            git commit -m "Add option navigation footers"
            git push
          else
            echo "No navigation footer changes needed."
          fi
